name: 🔧 Backend CI & Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy_backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  test-backend:
    name: 🧪 Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Lint with ruff
        working-directory: backend
        run: |
          pip install ruff
          ruff check . --ignore E501

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          SECRET_KEY: test-secret-key-for-ci-only-32chars!!
          ENVIRONMENT: test
          DEBUG: "true"
        run: pytest tests/ -v --tb=short

  deploy-render:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render Deploy Hook
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          curl -s -X POST "$RENDER_DEPLOY_HOOK" \
            -H "Accept: application/json" | jq .

      - name: Wait for deployment
        run: sleep 30

      - name: Health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://promptreel-ai.onrender.com/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ Backend healthy (HTTP $STATUS)"
          else
            echo "⚠️ Backend returned HTTP $STATUS — check Render dashboard"
          fi
