name: 🌐 Build & Deploy Flutter Web

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'website/**'
      - '.github/workflows/deploy_flutter_web.yml'
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.24.0'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: flutter-web-pages
  cancel-in-progress: false

jobs:
  build-flutter-web:
    name: 🏗️ Build Flutter Web App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Format code
        working-directory: frontend
        run: dart format lib/

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Analyze
        working-directory: frontend
        run: flutter analyze --no-fatal-warnings

      - name: Build Flutter Web
        working-directory: frontend
        run: |
          flutter build web --release \
            --web-renderer canvaskit \
            --dart-define=API_BASE_URL=https://promptreel-ai.onrender.com \
            --dart-define=FLW_PUBLIC_KEY=${{ secrets.FLW_PUBLIC_KEY }} \
            --base-href /promptreel-ai/app/

      # ✅ Combine website + Flutter web into one deployment folder
      - name: Combine website and Flutter web
        run: |
          mkdir -p combined
          # Copy marketing website to root
          cp -r website/. combined/
          # Copy Flutter web build to /app/ subfolder
          mkdir -p combined/app
          cp -r frontend/build/web/. combined/app/
          echo "✅ Combined structure:"
          ls -la combined/
          ls -la combined/app/

      - name: Upload combined build
        uses: actions/upload-artifact@v4
        with:
          name: combined-web-build
          path: combined/
          retention-days: 7

  deploy-flutter-web:
    name: 🚀 Deploy to GitHub Pages
    needs: build-flutter-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download combined build
        uses: actions/download-artifact@v4
        with:
          name: combined-web-build
          path: combined/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: combined/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Print URLs
        run: |
          echo "✅ Marketing site: https://exploreofficialzz-star.github.io/promptreel-ai/"
          echo "✅ Flutter web app: https://exploreofficialzz-star.github.io/promptreel-ai/app/"
