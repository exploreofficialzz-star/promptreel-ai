name: 🌐 Deploy Marketing Website to GitHub Pages

# ✅ Disabled — website is now deployed together with Flutter web
# by deploy_flutter_web.yml which combines both into one deployment.
# Having two workflows deploy to GitHub Pages causes them to overwrite each other.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'This workflow is disabled. Use deploy_flutter_web.yml instead.'
        required: true
        default: 'no'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  disabled:
    name: ⚠️ Disabled
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    steps:
      - name: Notice
        run: |
          echo "⚠️ This workflow is disabled."
          echo "Website is deployed by deploy_flutter_web.yml instead."
          echo "Both website and Flutter web are combined in one deployment."
