name: Build & Release PromptReel AI

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'apk'
        type: choice
        options:
          - apk
          - aab
          - both

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'
  APK_OUTPUT: build/app/outputs/flutter-apk/app-release.apk
  AAB_OUTPUT: build/app/outputs/bundle/release/app-release.aab

jobs:
  # ── Job 1: Analyze ────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos || echo "Analysis warnings found, continuing..."

      - name: 🧪 Run tests
        run: flutter test || echo "No tests found, skipping"

  # ── Job 2: Build APK ──────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ☕ Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: 🐦 Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔑 Setup keystore from GitHub Secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/promptreel-release.jks
          cat > android/key.properties << 'EOF'
          storeFile=../promptreel-release.jks
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          echo "✅ Keystore ready"

      - name: 🏗️ Build APK (release)
        run: |
          flutter build apk \
            --release \
            --obfuscate \
            --split-debug-info=debug-symbols \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=FLW_PUBLIC_KEY=${{ secrets.FLW_PUBLIC_KEY }} \
            --dart-define=FLW_TEST_MODE=false

      - name: 🏗️ Build AAB (main branch and tags only)
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        run: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=debug-symbols-aab \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=FLW_PUBLIC_KEY=${{ secrets.FLW_PUBLIC_KEY }} \
            --dart-define=FLW_TEST_MODE=false

      - name: 📏 Show build sizes
        run: |
          echo "=== APK ===" && ls -lh ${{ env.APK_OUTPUT }} || echo "APK not found"
          echo "=== AAB ===" && ls -lh ${{ env.AAB_OUTPUT }} || echo "AAB not found"

      - name: 🔖 Rename with version + timestamp
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          TIMESTAMP=$(date +%Y%m%d-%H%M)
          cp ${{ env.APK_OUTPUT }} promptreel-ai-${VERSION}-${TIMESTAMP}.apk || true
          cp ${{ env.AAB_OUTPUT }} promptreel-ai-${VERSION}-${TIMESTAMP}.aab || true

      - name: ⬆️ Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PromptReel-APK-${{ github.run_number }}
          path: |
            frontend/promptreel-ai-*.apk
            frontend/${{ env.APK_OUTPUT }}
          retention-days: 30

      - name: ⬆️ Upload AAB artifact
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: PromptReel-AAB-${{ github.run_number }}
          path: |
            frontend/promptreel-ai-*.aab
            frontend/${{ env.AAB_OUTPUT }}
          retention-days: 30

  # ── Job 3: GitHub Release (tags only) ─────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⬇️ Download APK
        uses: actions/download-artifact@v4
        with:
          name: PromptReel-APK-${{ github.run_number }}
          path: release-assets/

      - name: ⬇️ Download AAB
        uses: actions/download-artifact@v4
        with:
          name: PromptReel-AAB-${{ github.run_number }}
          path: release-assets/
        continue-on-error: true

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PromptReel AI ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: release-assets/*
          body: |
            ## PromptReel AI ${{ github.ref_name }}

            ### 📱 Install
            1. Download the `.apk` file below
            2. Enable **Install from unknown sources** on your Android phone
            3. Open the APK to install

            ### 🎬 What is PromptReel AI?
            Turn simple ideas into complete AI video production plans.

            ---
            *Made with ❤️ by chAs Tech Group*

  # ── Job 4: Notify on failure ──────────────────────────────────────────────
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [analyze, build-android]
    if: failure()
    steps:
      - name: Report failure
        run: |
          echo "Build failed!"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "By: ${{ github.actor }}"
