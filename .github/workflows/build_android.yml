name: 🤖 Android Build & Release

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'both'
        type: choice
        options: [apk, aab, both]

env:
  FLUTTER_VERSION: '3.24.0'
  JAVA_VERSION: '17'

jobs:
  analyze:
    name: 🔍 Analyze & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Format code
        working-directory: frontend
        run: dart format lib/

      - name: Analyze code
        working-directory: frontend
        run: flutter analyze --no-fatal-warnings

  build-android:
    name: 🏗️ Build Android
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('frontend/android/**/*.gradle*', 'frontend/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      # ── Signing Setup ──────────────────────────────────────────────────────
      - name: Decode keystore
        if: github.event_name != 'pull_request'
        working-directory: frontend/android/app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > promptreel-release.jks

      - name: Create key.properties
        if: github.event_name != 'pull_request'
        working-directory: frontend/android
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cat > key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../app/promptreel-release.jks
          EOF

      # ── Build APK (debug for PRs) ──────────────────────────────────────────
      - name: Build APK (debug)
        if: github.event_name == 'pull_request'
        working-directory: frontend
        run: |
          flutter build apk --debug \
            --dart-define=API_BASE_URL=https://promptreel-ai.onrender.com

      # ── Build APK (release — always on push/tag/manual) ───────────────────
      - name: Build APK (release)
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=https://promptreel-ai.onrender.com \
            --dart-define=FLW_PUBLIC_KEY=${{ secrets.FLW_PUBLIC_KEY }}

      # ── Build AAB (release — always on push/tag/manual) ───────────────────
      - name: Build AAB (release)
        if: github.event_name != 'pull_request'
        working-directory: frontend
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=https://promptreel-ai.onrender.com \
            --dart-define=FLW_PUBLIC_KEY=${{ secrets.FLW_PUBLIC_KEY }}

      # ── Upload Artifacts ───────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: promptreel-apk-${{ github.sha }}
          path: frontend/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        if: github.event_name != 'pull_request'
        with:
          name: promptreel-aab-${{ github.sha }}
          path: frontend/build/app/outputs/bundle/release/*.aab
          retention-days: 60

  # ── GitHub Release on Tag ──────────────────────────────────────────────────
  release:
    name: 🚀 Create GitHub Release
    runs-on: ubuntu-latest
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: promptreel-apk-${{ github.sha }}
          path: release-artifacts/

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: promptreel-aab-${{ github.sha }}
          path: release-artifacts/

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "PromptReel AI ${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🎬 PromptReel AI ${{ steps.version.outputs.VERSION }}
            Turn simple ideas into complete AI video production plans.

            ### 📦 Downloads
            - **APK** — Direct install (sideload)
            - **AAB** — Google Play Store submission

            ### What's Changed
            See [CHANGELOG.md](CHANGELOG.md) for full details.

            ---
            *Made with ❤️ by chAs Tech Group*
          files: release-artifacts/*
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-alpha') || contains(github.ref, '-rc') }}
