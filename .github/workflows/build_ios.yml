name: 🍎 iOS Build & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      export_method:
        description: 'Export method'
        required: true
        default: 'ad-hoc'
        type: choice
        options: [app-store, ad-hoc, development]

env:
  FLUTTER_VERSION: '3.24.0'

jobs:
  build-ios:
    name: 🏗️ Build iOS IPA
    runs-on: macos-latest
    env:
      HAS_CERT: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
      HAS_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: frontend/ios
        run: pod install --repo-update

      # ── Signing — only runs when secrets are set ──────────────────────────
      - name: Import signing certificate
        if: env.HAS_CERT == 'true'
        env:
          CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Install provisioning profile
        if: env.HAS_PROFILE == 'true'
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_PATH"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/

      # ── Build — always runs (no codesign until secrets are added) ─────────
      - name: Build iOS (no codesign)
        working-directory: frontend
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=API_BASE_URL=https://promptreel-ai.onrender.com \
            --dart-define=FLW_PUBLIC_KEY=${{ secrets.FLW_PUBLIC_KEY }} \
            --build-name=1.1.0 \
            --build-number=2 \
            -- \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # ── Archive & Export — only runs when signing secrets are set ─────────
      - name: Archive & Export IPA
        if: env.HAS_CERT == 'true'
        working-directory: frontend/ios
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            -allowProvisioningUpdates

      - name: Upload IPA
        if: env.HAS_CERT == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: promptreel-ios-${{ github.sha }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      # ── Confirmation when no signing secrets yet ──────────────────────────
      - name: ✅ Build complete (unsigned)
        if: env.HAS_CERT == 'false'
        run: |
          echo "✅ iOS build succeeded (unsigned)"
          echo "ℹ️  To enable full IPA export, add these secrets to your repo:"
          echo "   - IOS_CERTIFICATE_BASE64"
          echo "   - IOS_CERTIFICATE_PASSWORD"
          echo "   - IOS_KEYCHAIN_PASSWORD"
          echo "   - IOS_PROVISIONING_PROFILE_BASE64"
          echo "   - APPLE_TEAM_ID"

  # ── TestFlight Upload on Tag ───────────────────────────────────────────────
  testflight:
    name: 📤 Upload to TestFlight
    runs-on: macos-latest
    needs: build-ios
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      HAS_CERT: ${{ secrets.IOS_CERTIFICATE_BASE64 != '' }}
    steps:
      - name: Check signing secrets
        if: env.HAS_CERT != 'true'
        run: |
          echo "⚠️ Skipping TestFlight — IOS_CERTIFICATE_BASE64 secret not set."
          exit 0

      - uses: actions/checkout@v4

      - name: Download IPA
        if: env.HAS_CERT == 'true'
        uses: actions/download-artifact@v4
        with:
          name: promptreel-ios-${{ github.sha }}
          path: ipa/

      - name: Upload to App Store Connect
        if: env.HAS_CERT == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file ipa/*.ipa \
            --username "$APPLE_ID" \
            --password "$APP_SPECIFIC_PASSWORD"
