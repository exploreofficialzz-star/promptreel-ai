name: promptreel_ai
description: PromptReel AI — Turn simple ideas into complete AI video production plans.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router: ^14.2.0

  # ── Networking ────────────────────────────────────────────────────────────
  dio: ^5.7.0
  pretty_dio_logger: ^1.3.1

  # ── Local Storage ─────────────────────────────────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # ── UI ────────────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  fl_chart: ^0.67.0
  flutter_svg: ^2.0.10+1
  gap: ^3.0.1
  badges: ^3.1.2

  # ── Utils ─────────────────────────────────────────────────────────────────
  url_launcher: ^6.3.1
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  archive: ^3.6.1
  intl: ^0.19.0

  # ── Icons ─────────────────────────────────────────────────────────────────
  iconsax_flutter: ^1.0.1

  # ── Monetization ─────────────────────────────────────────────────────────
  google_mobile_ads: ^5.3.1

  # ── Payment (WebView checkout — more reliable than SDK) ───────────────────
  webview_flutter: ^4.4.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/images/
    - assets/animations/
    - assets/icons/
