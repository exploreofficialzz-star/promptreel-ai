<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Turn ideas into complete AI video production plans.">
  <meta property="og:title" content="PromptReel AI">
  <meta property="og:description" content="AI Video Production Platform">
  <link rel="manifest" href="manifest.json">
  <title>PromptReel AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      background-color: #0A0A0F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
    }
    
    #loading {
      text-align: center;
      color: white;
      opacity: 1;
      transition: opacity 0.5s ease-out;
    }
    
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .loader-emoji { 
      font-size: 56px; 
      margin-bottom: 16px;
      animation: bounce 1s ease-in-out infinite;
    }
    
    .loader-title {
      font-size: 24px; 
      font-weight: 900;
      background: linear-gradient(135deg, #FFB830, #FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    
    .loader-sub { 
      font-size: 13px; 
      color: #666; 
      margin-bottom: 32px; 
    }
    
    .loader-bar {
      width: 200px; 
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px; 
      overflow: hidden; 
      margin: 0 auto;
    }
    
    .loader-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(135deg, #FFB830, #FF8C00);
      animation: load 2s ease-in-out forwards; /* 'forwards' not 'infinite' */
    }
    
    @keyframes load {
      0% { width: 0%; }
      50% { width: 70%; }
      100% { width: 100%; }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    /* Hide loader when Flutter is ready */
    .flutter-ready #loading {
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.5s ease-out, visibility 0.5s;
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader-emoji">🎬</div>
    <div class="loader-title">PromptReel AI</div>
    <div class="loader-sub">AI Video Production Platform</div>
    <div class="loader-bar">
      <div class="loader-fill"></div>
    </div>
  </div>

  <!-- Flutter Bootstrap -->
  <script src="flutter.js" defer></script>
  
  <script>
    window.addEventListener('load', function() {
      var loading = document.getElementById('loading');
      
      // Wait for flutter.js to load
      if (typeof _flutter === 'undefined') {
        console.error('Flutter not loaded yet, waiting...');
        setTimeout(arguments.callee, 100);
        return;
      }
      
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          // Animate progress to 100% before hiding
          var fill = document.querySelector('.loader-fill');
          if (fill) {
            fill.style.animation = 'none';
            fill.style.width = '100%';
            fill.style.transition = 'width 0.3s ease-out';
          }
          
          // Small delay to show 100% progress
          setTimeout(function() {
            engineInitializer.initializeEngine().then(function(appRunner) {
              // Fade out and hide
              loading.classList.add('hidden');
              document.body.classList.add('flutter-ready');
              
              // Remove from DOM after fade
              setTimeout(function() {
                if (loading && loading.parentNode) {
                  loading.parentNode.removeChild(loading);
                }
              }, 500);
              
              // Run Flutter app
              appRunner.runApp();
            });
          }, 300);
        }
      });
    });
  </script>
</body>
</html>
