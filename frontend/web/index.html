<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Turn ideas into complete AI video production plans.">
  <title>PromptReel AI</title>
  <style>
    body {
      margin: 0;
      background: #0A0A0F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    #loading { text-align: center; color: white; }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    .title {
      font-size: 24px; font-weight: 900; margin-bottom: 8px;
      background: linear-gradient(135deg, #FFB830, #FF8C00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sub { font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="emoji">🎬</div>
    <div class="title">PromptReel AI</div>
    <div class="sub">Loading...</div>
  </div>

  <script>
    // Always go to login if no valid route
    var hash = window.location.hash;
    if (!hash || hash === '#' || hash === '#/') {
      window.history.replaceState(null, '', '/#/login');
    }

    var serviceWorkerVersion = '{{flutter_service_worker_version}}';
    var scriptLoaded = false;

    function loadMainDartJs() {
      if (scriptLoaded) return;
      scriptLoaded = true;
      var scriptTag = document.createElement('script');
      scriptTag.src = 'main.dart.js';
      scriptTag.type = 'application/javascript';
      document.body.append(scriptTag);
    }

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register(
          'flutter_service_worker.js?v=' + serviceWorkerVersion
        ).then(function(reg) {
            function waitForActivation(serviceWorker) {
              serviceWorker.addEventListener('statechange', function() {
                if (serviceWorker.state == 'activated') {
                  loadMainDartJs();
                }
              });
            }
            if (!reg.active && (reg.installing || reg.waiting)) {
              waitForActivation(reg.installing || reg.waiting);
            } else if (!reg.active.scriptURL.endsWith(serviceWorkerVersion)) {
              reg.update();
              waitForActivation(reg.installing);
            } else {
              loadMainDartJs();
            }
          });
        setTimeout(function() {
          if (!scriptLoaded) loadMainDartJs();
        }, 4000);
      });
    } else {
      loadMainDartJs();
    }
  </script>
</body>
</html>
