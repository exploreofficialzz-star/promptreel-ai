<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <!--
    PromptReel AI — Flutter Web Entry Point
    This file is required by `flutter build web`.
    Do NOT remove the flutter_bootstrap.js script — it bootstraps the Dart/WASM engine.
  -->
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ── SEO ──────────────────────────────────────────────────────────── -->
  <title>PromptReel AI</title>
  <meta name="description"
    content="PromptReel AI — Turn simple ideas into complete AI video production plans. Script, shot list, voiceover, image prompts and more.">
  <meta name="theme-color" content="#07070f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PromptReel AI">

  <!-- ── Favicon ───────────────────────────────────────────────────────── -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- ── PWA Manifest ──────────────────────────────────────────────────── -->
  <link rel="manifest" href="manifest.json">

  <!-- ── Splash / Loading Screen ───────────────────────────────────────── -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #07070f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      animation: fade-in 0.5s ease;
    }

    .app-logo {
      font-size: 64px;
      animation: pulse 2s ease-in-out infinite;
    }

    .app-name {
      font-size: 28px;
      font-weight: 800;
      color: #f0f0f8;
      letter-spacing: -0.5px;
    }

    .app-name span { color: #ffb830; }

    .app-tagline {
      font-size: 14px;
      color: #5a5a80;
      text-align: center;
      max-width: 280px;
      line-height: 1.6;
    }

    .loading-bar {
      width: 200px;
      height: 3px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
      margin-top: 8px;
    }

    .loading-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffb830, #ff9500);
      border-radius: 2px;
      animation: loading 2s ease-in-out infinite;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.08); }
    }

    @keyframes loading {
      0%   { width: 0%; margin-left: 0%; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }

    /* Hide loading screen once Flutter is ready */
    .flutter-loader-hidden #loading-screen {
      display: none;
    }
  </style>
</head>

<body>
  <!-- ── Loading Screen ────────────────────────────────────────────────── -->
  <div id="loading-screen">
    <div class="app-logo">🎬</div>
    <div class="app-name">PromptReel <span>AI</span></div>
    <div class="app-tagline">Turn simple ideas into complete video production plans</div>
    <div class="loading-bar">
      <div class="loading-bar-fill"></div>
    </div>
  </div>

  <!-- ── Flutter Bootstrap ─────────────────────────────────────────────── -->
  <!--
    flutter_bootstrap.js is generated by `flutter build web`.
    It bootstraps the compiled Dart/WASM application.
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      // Hide the loading screen once Flutter renders its first frame
      document.getElementById('loading-screen').style.display = 'none';
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
