<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Turn ideas into complete AI video production plans.">
  <title>PromptReel AI</title>
  <style>
    body {
      margin: 0;
      background: #0A0A0F;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    .wrap { text-align: center; color: white; }
    .emoji { font-size: 56px; margin-bottom: 16px; }
    .title {
      font-size: 24px; font-weight: 900; margin-bottom: 8px;
      background: linear-gradient(135deg, #FFB830, #FF8C00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .sub { font-size: 13px; color: #555; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="emoji">🎬</div>
    <div class="title">PromptReel AI</div>
    <div class="sub">Loading...</div>
  </div>

  <script>
    var hash = window.location.hash;
    var validRoutes = ['/login', '/home', '/create', '/results',
                       '/projects', '/tools', '/settings',
                       '/privacy', '/terms'];
    var isValid = false;
    for (var i = 0; i < validRoutes.length; i++) {
      if (hash === '#' + validRoutes[i] ||
          hash.indexOf('#' + validRoutes[i] + '/') === 0 ||
          hash.indexOf('#' + validRoutes[i] + '?') === 0) {
        isValid = true;
        break;
      }
    }
    if (!isValid) {
      window.history.replaceState(null, '', '/#/login');
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
